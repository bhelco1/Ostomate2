# Ostomate 2.0 CI.
# Cost rule (ostomate-2.0/07-business-plan.md): macOS runners bill at 10×.
# Phase 2.5.1: all 69 shared tests (incl. Room DAO + migrations, via Robolectric)
# run in the ubuntu `android` job, so every PR gates them at no macOS cost. The
# macOS `ios` job additionally validates the unsigned iOS build + the real native
# SQLite path, but only on PRs that touch iOS/DB/build files (see `detect-changes`).
# E2E (Maestro) still runs on main merges and manual dispatch only — emulator start-up is slow.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  detect-changes:
    name: Detect iOS / DB changes
    runs-on: ubuntu-latest
    outputs:
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        # Non-PR events (main push, manual dispatch) always validate iOS. On PRs,
        # only when files that can break the iOS build or the native SQLite path
        # (Room DAO + migrations live in shared/.../data/db) change.
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "ios=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          changed=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD)
          if echo "$changed" | grep -qE \
            '^(iosApp/|composeApp/src/iosMain/|shared/src/ios|shared/src/commonMain/kotlin/com/ostomate/app/data/db/|shared/schemas/|.*\.gradle\.kts$|gradle/libs\.versions\.toml$)'; then
            echo "ios=true" >> "$GITHUB_OUTPUT"
          else
            echo "ios=false" >> "$GITHUB_OUTPUT"
          fi

  android:
    name: Android build + JVM tests
    runs-on: ubuntu-latest
    env:
      # Job-level so the Codecov step's `if` can see it — the secrets context
      # itself is not allowed in step `if` expressions (invalidates the workflow).
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: ktlint check
        run: ./gradlew :shared:ktlintCheck :composeApp:ktlintCheck :androidApp:ktlintCheck --stacktrace
      - name: detekt
        run: ./gradlew :shared:detektMetadataCommonMain :composeApp:detektMetadataCommonMain :androidApp:detekt --stacktrace
      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug --stacktrace
      - name: Run JVM host tests with coverage
        # jacocoCoverageVerification fails the build if line coverage drops below the
        # floors in shared/build.gradle.kts (domain + data) and composeApp/build.gradle.kts
        # (ViewModel + UiState). :composeApp:testAndroidHostTest also verifies the Roborazzi
        # screenshot baselines in composeApp/screenshots/ (2.5.7) — a layout change fails here.
        run: >
          ./gradlew
          :shared:testAndroidHostTest :shared:jacocoHostTestReport :shared:jacocoCoverageVerification
          :composeApp:testAndroidHostTest :composeApp:jacocoHostTestReport :composeApp:jacocoCoverageVerification
          --stacktrace
      - name: Upload screenshot diffs
        # Only produced when a baseline mismatched: <name>_compare.png is a
        # reference | diff | new triptych, <name>_actual.png is the new render. Download this
        # artifact to see what moved; re-record with -Pscreenshot.record if the change is wanted.
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs
          path: composeApp/build/outputs/roborazzi/
          if-no-files-found: ignore
      - name: Publish coverage summary
        if: always()
        run: |
          python3 - <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          import xml.etree.ElementTree as ET
          reports = [
              ("shared (domain + data)", "shared/build/reports/jacoco/jacocoHostTestReport/jacocoHostTestReport.xml"),
              ("composeApp (ViewModel + UiState)", "composeApp/build/reports/jacoco/jacocoHostTestReport/jacocoHostTestReport.xml"),
          ]
          print("## Coverage\n")
          for title, path in reports:
              try:
                  root = ET.parse(path).getroot()
              except FileNotFoundError:
                  print(f"**{title}** — _no report produced (tests failed before JaCoCo ran)._\n")
                  continue
              print(f"### {title}\n")
              print("| Counter | Covered | % |")
              print("|---|---|---|")
              for c in root.findall("counter"):
                  missed, covered = int(c.get("missed")), int(c.get("covered"))
                  total = missed + covered
                  print(f"| {c.get('type').title()} | {covered}/{total} | {100 * covered / total:.1f}% |")
              print("\n| Package | Line % |")
              print("|---|---|")
              for p in root.findall("package"):
                  for c in p.findall("counter"):
                      if c.get("type") == "LINE":
                          missed, covered = int(c.get("missed")), int(c.get("covered"))
                          print(f"| {p.get('name').replace('com/ostomate/app/', '')} | {100 * covered / (missed + covered):.1f}% |")
              print()
          EOF
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            shared/build/reports/jacoco/jacocoHostTestReport/
            composeApp/build/reports/jacoco/jacocoHostTestReport/
          if-no-files-found: ignore
      - name: Upload coverage to Codecov
        # Approved in 08-test-strategy §6 (free — public repo). Inert until the
        # CODECOV_TOKEN secret is added under Settings → Secrets → Actions.
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: >-
            shared/build/reports/jacoco/jacocoHostTestReport/jacocoHostTestReport.xml,
            composeApp/build/reports/jacoco/jacocoHostTestReport/jacocoHostTestReport.xml
      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results-jvm
          path: |
            shared/build/test-results/testAndroidHostTest/TEST-*.xml
            composeApp/build/test-results/testAndroidHostTest/TEST-*.xml
          if-no-files-found: ignore
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: androidApp-debug
          path: androidApp/build/outputs/apk/debug/*.apk

  android-e2e:
    name: Android E2E (Maestro)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    needs: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug --stacktrace
      - name: Install Maestro
        # Pinned: the installer defaults to latest, so a new Maestro release can change
        # the flow schema and break the suite with no commit of ours. 2.x turned unknown
        # properties into hard errors, which is how `timeout:` on assertVisible silently
        # rotted every flow. Bump deliberately, not by drift.
        env:
          MAESTRO_VERSION: 2.6.1
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
          "$HOME/.maestro/bin/maestro" --version
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/local/lib/android/sdk/build-tools/29.0.3
          sudo rm -rf /usr/local/lib/android/sdk/build-tools/30.0.3
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/hostedtoolcache/go
          sudo rm -rf /opt/hostedtoolcache/Ruby
          df -h
      - name: Enable KVM (required for Android emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run Maestro E2E flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: pixel_4
          disable-animations: true
          # -no-window + swiftshader_indirect are required on a headless runner: without
          # them the emulator waits on a display that never appears and boot times out.
          emulator-options: >-
            -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
            -camera-back none -camera-front none
          boot-timeout: 900
          script: |
            adb start-server
            adb wait-for-device
            until adb shell getprop sys.boot_completed 2>/dev/null | grep -q '1'; do sleep 3; done
            adb install androidApp/build/outputs/apk/debug/androidApp-debug.apk
            bash scripts/run_android_e2e.sh
      - name: Upload E2E failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics
          # Workspace-relative on purpose: the previous attempt pointed at maestro-debug/
          # and ~/.maestro/tests/ and got "No files were found" for both, so every
          # "element not found" so far has been reasoned about rather than looked at.
          path: e2e-diagnostics/
          if-no-files-found: warn

  ios:
    name: iOS shared tests + app build
    # Apple-Silicon runner: validates the unsigned iOS build and runs the arm64 simulator
    # tests against the REAL bundled native driver (the ubuntu `android` job already gates
    # all 69 on the JVM via Robolectric). PRs only when iOS/DB-layer files changed
    # (see detect-changes), else main only.
    runs-on: macos-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.ios == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Select newest Xcode
        # Runner default (16.4) is too old for CMP 1.11 — its framework references
        # newer UIKit symbols (e.g. UIViewLayoutRegion) and the app link fails.
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -n1)"
          xcodebuild -version
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: SwiftLint
        run: swiftlint lint --config iosApp/.swiftlint.yml --strict iosApp/
      - name: Shared + ViewModel tests on iOS simulator (arm64)
        run: ./gradlew :shared:iosSimulatorArm64Test :composeApp:iosSimulatorArm64Test --stacktrace
      - name: Generate Secrets.swift stub
        # Secrets.swift is gitignored (holds the Sentry DSN) so it is absent in CI, but
        # the Xcode target compiles it. Write an empty-DSN stub: iOSApp.swift guards on
        # `!dsn.isEmpty`, so Sentry stays off for CI builds. Secrets.xcconfig is optional
        # (Config.xcconfig uses `#include?`), so no stub is needed for it.
        run: |
          cat > iosApp/iosApp/Secrets.swift <<'SWIFT'
          enum Secrets {
              static let sentryDSN = ""
          }
          SWIFT
      - name: Build iOS app (simulator, unsigned)
        # ARCHS=arm64 because composeApp publishes no x86_64 slice (CMP 1.11+ dropped it);
        # an unconstrained simulator build tries both archs and fails.
        run: |
          cd iosApp
          xcodebuild -project iosApp.xcodeproj -target iosApp -configuration Debug \
            -sdk iphonesimulator ARCHS=arm64 ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO build

  ios-e2e:
    name: iOS E2E (Maestro)
    runs-on: macos-latest
    # Post-merge / manual dispatch only, same as android-e2e: macOS runners are slow
    # (and bill at 10x on private repos — free here, but the wall-clock cost is real).
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Select newest Xcode
        # Same reason as the `ios` job: the runner default is too old for CMP 1.11.
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -n1)"
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Generate Secrets.swift stub
        # Gitignored (holds the Sentry DSN) so it is absent in CI, but the Xcode target
        # compiles it. Empty DSN => iOSApp.swift keeps Sentry off.
        run: |
          cat > iosApp/iosApp/Secrets.swift <<'SWIFT'
          enum Secrets {
              static let sentryDSN = ""
          }
          SWIFT
      - name: Install Maestro
        # Pinned for the same reason as android-e2e — keep the two in lockstep.
        env:
          MAESTRO_VERSION: 2.6.1
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
          "$HOME/.maestro/bin/maestro" --version
      - name: Build iOS app for the simulator
        # -scheme (not -target) so the product lands in a predictable -derivedDataPath.
        # ARCHS=arm64: composeApp publishes no x86_64 slice (CMP 1.11+ dropped it).
        run: |
          cd iosApp
          xcodebuild -project iosApp.xcodeproj -scheme iosApp -configuration Debug \
            -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' \
            ARCHS=arm64 ONLY_ACTIVE_ARCH=YES CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath "$RUNNER_TEMP/dd" build
      - name: Boot a clean simulator
        # A *freshly created* device matters. Booting a pre-existing simulator can raise
        # a stray SpringBoard alert ("Allow widgets from Maps to use your location?") that
        # sits on top of the app — Maestro then sees only the alert and every flow fails.
        # A new device from `simctl create` has no such state.
        run: |
          read -r RUNTIME DEVTYPE < <(python3 scripts/pick_ios_simulator.py)
          echo "runtime=$RUNTIME device-type=$DEVTYPE"
          UDID=$(xcrun simctl create maestro-ios "$DEVTYPE" "$RUNTIME")
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
      - name: Install app on the simulator
        run: |
          xcrun simctl install "$SIM_UDID" \
            "$RUNNER_TEMP/dd/Build/Products/Debug-iphonesimulator/Ostomate.app"
      - name: Run Maestro E2E flows (iOS)
        # Covers the clusters where real device bugs appeared: onboarding, log a change,
        # deep link, backup/share. `.maestro/ios/` holds the iOS variants — the Android
        # flows they mirror stay untouched. 08 is platform-neutral and is reused as-is.
        #
        # Why variants at all: on iOS Maestro full-string-matches `text:` against the
        # accessibility tree, so the Android flows' `text: "logged"` never matches the
        # "Bag logged · 0 left" snackbar; and their Android-only bits (`pressKey: BACK`,
        # `launchApp.arguments.url`) are no-ops here.
        env:
          # The XCUITest driver never came up on the runner and the job died before a single
          # step ran ("iOS driver not ready in time" / IOSDriverTimeoutException). The default
          # startup timeout is fine on a warm local M1 and not on a cold macOS runner.
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 300000
        run: |
          # Run every flow even after one fails, so a red run names ALL the broken flows
          # rather than only the first — same reason as scripts/run_android_e2e.sh.
          fail=0
          for flow in \
            .maestro/ios/00_ios_onboarding.yaml \
            .maestro/ios/01_ios_deep_link_log.yaml \
            .maestro/ios/02_ios_log_and_undo.yaml \
            .maestro/ios/05_ios_backup_share.yaml \
            .maestro/08_biometric_gate.yaml; do
            echo "::group::maestro (iOS) $flow"
            if maestro test --device "$SIM_UDID" "$flow"; then
              echo "PASS  $flow" >> /tmp/ios_e2e_summary
            else
              echo "FAIL  $flow" >> /tmp/ios_e2e_summary
              fail=1
            fi
            echo "::endgroup::"
          done
          echo "===== iOS E2E SUMMARY ====="
          cat /tmp/ios_e2e_summary
          echo "=========================="
          exit $fail
      - name: Collect Maestro debug output
        # Maestro writes logs + screenshots under $HOME; upload-artifact does not expand
        # `~`/`$HOME` in `path`, so stage them inside the workspace first.
        if: failure()
        run: |
          mkdir -p maestro-debug
          cp -R "$HOME/.maestro/tests/." maestro-debug/ 2>/dev/null || true
      - name: Upload Maestro debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-ios-debug
          path: maestro-debug/
          if-no-files-found: ignore

  dashboard:
    name: Publish QA dashboard
    # Post-merge/dispatch only: regenerates the static dashboard (Unit / Integration /
    # UI / CI-CD) and force-pushes it to the `test-dashboard` branch. Bobby's Raspberry
    # Pi pulls that branch and serves it (scripts/pi/update-dashboard.sh); trend history
    # lives in history.json, so the branch keeps a single commit.
    runs-on: ubuntu-latest
    needs: [android, ios, android-e2e, ios-e2e]
    if: always() && github.event_name != 'pull_request'
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        # Restores shared/… and composeApp/… JUnit XML + JaCoCo reports in place.
        continue-on-error: true
        with:
          name: junit-results-jvm
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: coverage-report
      - name: Fetch job conclusions
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" > jobs.json
      - name: Carry over trend history
        run: |
          mkdir -p site
          if git ls-remote --exit-code origin test-dashboard >/dev/null 2>&1; then
            git fetch origin test-dashboard --depth 1
            git show origin/test-dashboard:history.json > site/history.json || true
          fi
      - name: Generate dashboard
        run: |
          python3 scripts/generate_test_dashboard.py \
            --repo . --jobs-json jobs.json --output-dir site \
            --sha "$GITHUB_SHA" --branch "$GITHUB_REF_NAME" \
            --run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
      - name: Push to test-dashboard branch
        run: |
          cd site
          git init -b test-dashboard
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "dashboard: run $GITHUB_RUN_ID"
          git push --force \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
            test-dashboard
