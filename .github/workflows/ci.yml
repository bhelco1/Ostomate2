# Ostomate 2.0 CI.
# Cost rule (ostomate-2.0/07-business-plan.md): macOS runners bill at 10×.
# Phase 2.5.1: all 69 shared tests (incl. Room DAO + migrations, via Robolectric)
# run in the ubuntu `android` job, so every PR gates them at no macOS cost. The
# macOS `ios` job additionally validates the unsigned iOS build + the real native
# SQLite path, but only on PRs that touch iOS/DB/build files (see `detect-changes`).
# E2E (Maestro) still runs on main merges and manual dispatch only — emulator start-up is slow.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  detect-changes:
    name: Detect iOS / DB changes
    runs-on: ubuntu-latest
    outputs:
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        # Non-PR events (main push, manual dispatch) always validate iOS. On PRs,
        # only when files that can break the iOS build or the native SQLite path
        # (Room DAO + migrations live in shared/.../data/db) change.
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "ios=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          changed=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD)
          if echo "$changed" | grep -qE \
            '^(iosApp/|composeApp/src/iosMain/|shared/src/ios|shared/src/commonMain/kotlin/com/ostomate/app/data/db/|shared/schemas/|.*\.gradle\.kts$|gradle/libs\.versions\.toml$)'; then
            echo "ios=true" >> "$GITHUB_OUTPUT"
          else
            echo "ios=false" >> "$GITHUB_OUTPUT"
          fi

  android:
    name: Android build + JVM tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: ktlint check
        run: ./gradlew :shared:ktlintCheck :composeApp:ktlintCheck :androidApp:ktlintCheck --stacktrace
      - name: detekt
        run: ./gradlew :shared:detektMetadataCommonMain :composeApp:detektMetadataCommonMain :androidApp:detekt --stacktrace
      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug --stacktrace
      - name: Run JVM host tests
        run: ./gradlew :shared:testAndroidHostTest --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: androidApp-debug
          path: androidApp/build/outputs/apk/debug/*.apk

  android-e2e:
    name: Android E2E (Maestro)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    needs: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug --stacktrace
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/local/lib/android/sdk/build-tools/29.0.3
          sudo rm -rf /usr/local/lib/android/sdk/build-tools/30.0.3
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/hostedtoolcache/go
          sudo rm -rf /opt/hostedtoolcache/Ruby
          df -h
      - name: Enable KVM (required for Android emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run Maestro E2E flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: pixel_4
          disable-animations: true
          emulator-options: -no-snapshot -noaudio -no-boot-anim
          boot-timeout: 600
          script: |
            adb start-server
            adb wait-for-device
            until adb shell getprop sys.boot_completed 2>/dev/null | grep -q '1'; do sleep 3; done
            adb install androidApp/build/outputs/apk/debug/androidApp-debug.apk
            maestro test .maestro/02_log_and_undo.yaml
            maestro test .maestro/03_edit_delete_event.yaml
            maestro test .maestro/04_set_inventory.yaml
            maestro test .maestro/05_backup_round_trip.yaml
            maestro test .maestro/08_biometric_gate.yaml

  ios:
    name: iOS shared tests + app build
    # Apple-Silicon runner: validates the unsigned iOS build and runs the arm64 simulator
    # tests against the REAL bundled native driver (the ubuntu `android` job already gates
    # all 69 on the JVM via Robolectric). PRs only when iOS/DB-layer files changed
    # (see detect-changes), else main only.
    runs-on: macos-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.ios == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Select newest Xcode
        # Runner default (16.4) is too old for CMP 1.11 — its framework references
        # newer UIKit symbols (e.g. UIViewLayoutRegion) and the app link fails.
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -n1)"
          xcodebuild -version
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: SwiftLint
        run: swiftlint lint --config iosApp/.swiftlint.yml --strict iosApp/
      - name: Shared tests on iOS simulator (arm64)
        run: ./gradlew :shared:iosSimulatorArm64Test --stacktrace
      - name: Build iOS app (simulator, unsigned)
        # ARCHS=arm64 because composeApp publishes no x86_64 slice (CMP 1.11+ dropped it);
        # an unconstrained simulator build tries both archs and fails.
        run: |
          cd iosApp
          xcodebuild -project iosApp.xcodeproj -target iosApp -configuration Debug \
            -sdk iphonesimulator ARCHS=arm64 ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO build
