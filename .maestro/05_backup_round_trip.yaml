appId: com.ostomate.app
name: "Journey 5: Backup round-trip"
---
- launchApp:
    clearState: true

# Skip onboarding — clearState resets the onboarding flag.
- tapOn:
    text: "Skip"
    optional: true

# Log a few events
- tapOn:
    id: "logButton"
    index: 0
- waitForAnimationToEnd
- tapOn:
    id: "logButton"
    index: 1
    optional: true
- waitForAnimationToEnd

# Navigate to Settings
- tapOn:
    text: "Settings"
- assertVisible:
    text: "Backup*"
    timeout: 3000

# Export CSV — triggers Android share sheet
- tapOn:
    text: "Export"
- waitForAnimationToEnd

# Share sheet cannot be fully automated; dismiss it
- pressKey: BACK
