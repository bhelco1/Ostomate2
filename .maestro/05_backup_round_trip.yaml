appId: com.ostomate.app
name: "Journey 5: Backup round-trip"
---
- launchApp:
    clearState: true

# Skip onboarding — clearState resets the onboarding flag.
- tapOn:
    text: "Skip"
    optional: true

# Log a few events
- tapOn:
    id: "logButton"
    index: 0
- waitForAnimationToEnd
- tapOn:
    id: "logButton"
    index: 1
    optional: true
- waitForAnimationToEnd

# Navigate to Settings
- tapOn:
    text: "Settings"
- extendedWaitUntil:
    visible:
      text: "Backup*"
    timeout: 3000

# Export the JSON backup — triggers Android share sheet.
# Targeted by id: "Export backup" and "Export log" both contain "Export".
- tapOn:
    id: "exportBackupButton"
- waitForAnimationToEnd

# Share sheet cannot be fully automated; dismiss it
- pressKey: BACK
