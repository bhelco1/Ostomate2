appId: com.ostomate.app
name: "Journey 8: Biometric gate on Settings"
---
- launchApp:
    clearState: true

# Skip onboarding — clearState resets the onboarding flag.
- tapOn:
    text: "Skip"
    optional: true

# Wait for home screen
- extendedWaitUntil:
    visible:
      text: "Ostomate"
    timeout: 5000

# Enable biometric lock in Settings
- tapOn:
    text: "Settings"
- extendedWaitUntil:
    visible:
      text: "Biometric Lock"
    timeout: 3000
- tapOn:
    id: "biometricLockSwitch"

# Navigate away then back to trigger the re-lock on ON_RESUME
- tapOn:
    text: "Home"
- tapOn:
    text: "Settings"

# On emulator without enrolled biometrics: NotEnrolled → auto-unlock.
# Settings content becomes visible once auto-unlock completes.
- extendedWaitUntil:
    visible:
      text: "Manage Supplies"
    timeout: 4000
