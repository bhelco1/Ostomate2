appId: com.ostomate.app
name: "Journey 2: Log + undo"
---
- launchApp:
    clearState: true

# Skip onboarding — clearState resets the onboarding flag.
- tapOn:
    text: "Skip"
    optional: true

# Wait for home screen to load
- assertVisible:
    text: "Ostomate"
    timeout: 5000

# Tap the log button on the first supply card
- tapOn:
    id: "logButton"
    index: 0

# Undo snackbar should appear
- assertVisible:
    text: "logged"
    timeout: 3000

# Tap Undo within 5 seconds
- tapOn:
    text: "Undo"

# Verify snackbar gone
- assertNotVisible:
    text: "logged"
    timeout: 2000
