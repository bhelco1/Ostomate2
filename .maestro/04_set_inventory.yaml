appId: com.ostomate.app
name: "Journey 4: Set on-hand inventory count via Settings → Manage Supplies"
---
- launchApp:
    clearState: true

# Wait for home screen
- assertVisible:
    text: "Ostomate"
    timeout: 5000

# Navigate to Settings
- tapOn:
    text: "Settings"
- assertVisible:
    text: "Manage Supplies"
    timeout: 3000

# Open Manage Supplies
- tapOn:
    text: "Manage Supplies"
- assertVisible:
    text: "Manage Supplies"
    timeout: 3000

# Tap the edit button on the first supply (Bag)
- tapOn:
    id: "editSupplyButton"
    index: 0

# Edit count dialog should appear
- assertVisible:
    text: "Edit*count"
    timeout: 3000

# Clear the field and type 12
- clearText
- inputText: "12"

# Save
- tapOn:
    text: "Save"

# Verify updated count is visible
- assertVisible:
    text: "12 on hand"
    timeout: 3000

# Go back to Settings and re-enter to verify persistence
- tapOn:
    text: "Settings"

- tapOn:
    text: "Manage Supplies"
- assertVisible:
    text: "12 on hand"
    timeout: 3000
