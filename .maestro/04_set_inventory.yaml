appId: com.ostomate.app
name: "Journey 4: Set on-hand inventory count via Settings → Manage Supplies"
---
- launchApp:
    clearState: true

# Skip onboarding — clearState resets the onboarding flag.
- tapOn:
    text: "Skip"
    optional: true

# Wait for home screen
- extendedWaitUntil:
    visible:
      text: "Ostomate"
    timeout: 5000

# Navigate to Settings
- tapOn:
    text: "Settings"
- extendedWaitUntil:
    visible:
      text: "Manage Supplies"
    timeout: 3000

# Open Manage Supplies
- tapOn:
    text: "Manage Supplies"
- extendedWaitUntil:
    visible:
      text: "Manage Supplies"
    timeout: 3000

# Tap the on-hand count number to open the set-count dialog
# testTag is "supplyCount_${id}" — use index 0 for the first supply
- tapOn:
    id: "supplyCount_*"
    index: 0

# Dialog title is "Set Bag count" (manage_supplies_set_count_title = "Set %1$s count")
- extendedWaitUntil:
    visible:
      text: ".*Set.*count.*"
    timeout: 3000

# Clear field and type 12
- tapOn:
    id: "editCountField"
- clearText
- inputText: "12"

# Save
- tapOn:
    text: "Save"

# Count row shows "12 on hand · box of 30" — assert on substring
- extendedWaitUntil:
    visible:
      text: ".*12 on hand.*"
    timeout: 3000

# Navigate back via Settings nav to verify persistence across re-entry
- tapOn:
    text: "Settings"
- tapOn:
    text: "Manage Supplies"
- extendedWaitUntil:
    visible:
      text: ".*12 on hand.*"
    timeout: 3000
