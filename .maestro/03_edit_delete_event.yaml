appId: com.ostomate.app
name: "Journey 3: Edit/delete event from calendar day sheet"
---
- launchApp:
    clearState: true

# Skip onboarding — clearState resets the onboarding flag.
- tapOn:
    text: "Skip"
    optional: true

# Log an event first so there's something to edit
- tapOn:
    id: "logButton"
    index: 0
- extendedWaitUntil:
    visible:
      text: ".*logged.*"
    timeout: 3000
- tapOn:
    text: "Undo"
    optional: true

# Log one more event (keep it)
- tapOn:
    id: "logButton"
    index: 0
- waitForAnimationToEnd

# Navigate to Calendar tab
- tapOn:
    id: "nav_calendar"
- extendedWaitUntil:
    visible:
      text: "Calendar"
    timeout: 3000

# Tap on today's date cell (testTag added to DayCell when day.isToday)
- tapOn:
    id: "dayCell_today"

# Day detail sheet appears — "+ Add an entry for this day" is always shown
- extendedWaitUntil:
    visible:
      text: ".*Add an entry.*"
    timeout: 2000

# Dismiss the day-detail sheet. A bare coordinate swipe does not reliably dismiss a
# ModalBottomSheet: the sheet stayed up, so the supply-card overflow button below it
# was in the hierarchy but not hittable, and Maestro reported it as not found.
# Press BACK and assert the sheet is actually gone before touching Home.
- pressKey: BACK
- extendedWaitUntil:
    notVisible:
      text: ".*Add an entry.*"
    timeout: 3000

# Navigate to History via supply card overflow
- tapOn:
    id: "nav_home"
- tapOn:
    id: "overflowButton"
    index: 0
- tapOn:
    text: "View history"
- extendedWaitUntil:
    visible:
      text: ".*Bag.*"
    timeout: 3000

# Swipe left to delete the first event (testTag "eventRow" on SwipeToDismissBox).
# The element key is `from:`, not `element:` — Maestro's YamlSwipeElement takes
# (direction, from). With `element:` the swipe silently degraded to a plain directional
# swipe across the middle of the screen, which missed the row (it sits near the top), so
# nothing was ever dismissed and the "Event deleted" snackbar never appeared.
# Longer duration than the 300 ms default-ish: SwipeToDismissBox's positional threshold is
# 50% of the row width, so the gesture has to actually carry it past halfway.
- swipe:
    from:
      id: "eventRow"
      index: 0
    direction: LEFT
    duration: 600

# Undo delete
- extendedWaitUntil:
    visible:
      text: "Event deleted"
    timeout: 3000
- tapOn:
    text: "Undo"
