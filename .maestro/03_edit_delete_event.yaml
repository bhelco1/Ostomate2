appId: com.ostomate.app
name: "Journey 3: Edit/delete event from calendar day sheet"
---
- launchApp:
    clearState: true

# Skip onboarding — clearState resets the onboarding flag.
- tapOn:
    text: "Skip"
    optional: true

# Log an event first so there's something to edit
- tapOn:
    id: "logButton"
    index: 0
- extendedWaitUntil:
    visible:
      text: "logged"
    timeout: 3000
- tapOn:
    text: "Undo"
    optional: true

# Log one more event (keep it)
- tapOn:
    id: "logButton"
    index: 0
- waitForAnimationToEnd

# Navigate to Calendar tab
- tapOn:
    text: "Calendar"
- extendedWaitUntil:
    visible:
      text: "Calendar"
    timeout: 3000

# Tap on today's date cell (testTag added to DayCell when day.isToday)
- tapOn:
    id: "dayCell_today"

# Day detail sheet appears — "+ Add an entry for this day" is always shown
- extendedWaitUntil:
    visible:
      text: "+ Add an entry*"
    timeout: 2000

# Swipe down to dismiss sheet
- swipe:
    direction: DOWN
    duration: 500

# Navigate to History via supply card overflow
- tapOn:
    text: "Home"
- tapOn:
    id: "overflowButton"
    index: 0
- tapOn:
    text: "View history"
- extendedWaitUntil:
    visible:
      text: "Bag*"
    timeout: 3000

# Swipe left to delete the first event (testTag "eventRow" on SwipeToDismissBox)
- swipe:
    element:
      id: "eventRow"
      index: 0
    direction: LEFT
    duration: 300

# Undo delete
- extendedWaitUntil:
    visible:
      text: "Event deleted"
    timeout: 3000
- tapOn:
    text: "Undo"
