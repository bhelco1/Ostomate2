appId: com.ostomate.app
name: "Journey 3: Edit/delete event from calendar day sheet"
---
- launchApp:
    clearState: true

# Log an event first so there's something to edit
- tapOn:
    id: "logButton"
    index: 0
- assertVisible:
    text: "logged"
    timeout: 3000
- tapOn:
    text: "Undo"
    optional: true

# Log one more event (keep it)
- tapOn:
    id: "logButton"
    index: 0
- waitForAnimationToEnd

# Navigate to Calendar tab
- tapOn:
    text: "Calendar"
- assertVisible:
    text: "Calendar*"
    timeout: 3000

# Tap on today's date cell (today should have a pill)
- tapOn:
    id: "dayCell_today"

# Day detail sheet appears
- assertVisible:
    text: "Events"
    timeout: 2000

# Swipe down to dismiss sheet
- swipe:
    direction: DOWN
    duration: 500

# Navigate to History to verify
- tapOn:
    text: "Home"
- tapOn:
    id: "overflowButton"
    index: 0
- tapOn:
    text: "View history"
- assertVisible:
    text: "Bag*"
    timeout: 3000

# Swipe to delete the event
- swipe:
    element:
      id: "eventRow"
      index: 0
    direction: LEFT
    duration: 300

# Undo delete
- assertVisible:
    text: "Event deleted"
    timeout: 3000
- tapOn:
    text: "Undo"
