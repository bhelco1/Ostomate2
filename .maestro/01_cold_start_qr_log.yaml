appId: com.ostomate.app
name: "Journey 1: Cold-start QR log"
---
# Get past onboarding first: a fresh install shows it, and it would swallow the deep link.
- launchApp:
    clearState: true
- tapOn:
    text: "Skip"
    optional: true
- extendedWaitUntil:
    visible:
      text: "Ostomate"
    timeout: 5000

# Cold start: kill the app so the deep link genuinely starts a dead process, which is what
# scanning a QR sticker does.
- stopApp

# Fire the real VIEW intent. NOTE: `launchApp.arguments.url` (what this flow used to do) is
# a no-op — it passes a launch *argument*, it does not deliver the URL to the app, so this
# flow silently proved nothing. openLink is the only thing that drives the scheme.
- openLink: "ostomate://log?item=bag"

# The buffered DeepLinkBus event fires the snackbar once MainApp composes.
- extendedWaitUntil:
    visible:
      text: ".*Logged:.*"
    timeout: 8000

# ...and the event must actually reach the database, not just flash a snackbar.
- tapOn:
    id: "overflowButton"
    index: 0
- tapOn:
    text: "View history"
- extendedWaitUntil:
    visible:
      id: "eventRow"
    timeout: 5000
