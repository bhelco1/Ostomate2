appId: com.ostomate.app
name: "Journey 1: Cold-start QR log"
---
# Launch with deep link (simulates QR scan on cold start)
- launchApp:
    arguments:
      url: "ostomate://log?item=bag"
    clearState: true

# Skip onboarding — clearState resets the onboarding flag.
# DB is seeded with Bag + Flange on fresh create, so supplies exist after skip.
- tapOn:
    text: "Skip"
    optional: true

# After MainApp composes, the buffered DeepLinkBus event fires the snackbar.
- extendedWaitUntil:
    visible:
      text: ".*Logged:.*"
    timeout: 4000

# Navigate to History to verify event was created
- tapOn:
    id: "nav_home"
    optional: true
- tapOn:
    id: "overflowButton"
    index: 0
- tapOn:
    text: "View history"

# At least one event visible
- assertVisible:
    text: ".*Bag.*"
