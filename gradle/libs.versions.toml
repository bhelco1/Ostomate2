[versions]
agp = "9.0.1"
detekt = "1.23.8"
kotest = "5.9.1"
kover = "0.8.3"
ktlint-gradle = "12.1.2"
kotlinx-datetime = "0.6.1"
android-compileSdk = "36"
android-minSdk = "26"
android-targetSdk = "36"
androidx-activity = "1.13.0"
androidx-biometric = "1.1.0"
androidx-fragment = "1.8.9"
androidx-lifecycle = "2.10.0"
androidx-work = "2.11.2"
compose-material-icons = "1.7.3"
compose-navigation = "2.9.2"
datastore = "1.1.7"
composeMultiplatform = "1.11.0"
koin = "4.2.1"
kotlin = "2.3.21"
kotlinx-coroutines = "1.10.2"
ksp = "2.3.9"
material3 = "1.11.0-alpha07"
okio = "3.9.1"
room = "2.8.4"
sqlite = "2.6.2"

[libraries]
build-agp = { module = "com.android.tools.build:gradle", version.ref = "agp" }
build-detekt-gradle = { module = "io.gitlab.arturbosch.detekt:detekt-gradle-plugin", version.ref = "detekt" }
build-kotlin-gradle = { module = "org.jetbrains.kotlin:kotlin-gradle-plugin", version.ref = "kotlin" }
build-ktlint-gradle = { module = "org.jlleitschuh.gradle:ktlint-gradle", version.ref = "ktlint-gradle" }
